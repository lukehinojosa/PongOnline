<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Online Pong</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }
        canvas#canvas {
            display: block;
            /* Pixel dimensions are set by JS/raylib; CSS just positions it. */
        }
    </style>
</head>
<body>
<!-- tabindex makes the canvas focusable so paste events route here correctly -->
<canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>

<script type='text/javascript'>
    // Size the canvas to the full viewport before Emscripten initialises it.
    (function() {
        var canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Focus the canvas so keyboard / paste events are delivered immediately.
        canvas.focus();
    })();

    var Module = {
        canvas: document.getElementById('canvas')
    };
</script>

{{{ SCRIPT }}}
</body>
</html>
