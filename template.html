<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Online Pong</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 0 none;
            background-color: black;
            display: block;
            /* Scale canvas to fit screen while maintaining aspect ratio */
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
<!-- Raylib/Emscripten requires this ID to be "canvas" -->
<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<script type='text/javascript'>
    var Module = {
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            return canvas;
        })()
    };
</script>

{{{ SCRIPT }}}
</body>
</html>
